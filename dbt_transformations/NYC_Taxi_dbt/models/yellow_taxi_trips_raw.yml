version: 2

sources:
  - name: raw
    database: NYC_TAXI_DW
    schema: "SCHEMA_{{ env_var('RAW_SCHEMA') }}"
    tables:
      - name: YELLOW_TAXI_TRIPS_RAW
        description: "Raw NYC Yellow Taxi trips data from TLC (Taxi & Limousine Commission)."
        columns:
          - name: TRIP_ID
            description: "Unique identifier for the trip."
            tests:
              - not_null
              - unique
          - name: VENDORID
            description: "Identifier for the taxi vendor (1=Creative Mobile Technologies, 2=VeriFone Inc)."
            tests:
              - not_null
          - name: TPEP_PICKUP_DATETIME
            description: "Timestamp when the meter was engaged (pickup)."
            tests:
              - not_null
          - name: TPEP_DROPOFF_DATETIME
            description: "Timestamp when the meter was disengaged (dropoff)."
            tests:
              - not_null
          - name: PASSENGER_COUNT
            description: "Number of passengers in the vehicle (driver-entered value)."
          - name: TRIP_DISTANCE
            description: "Elapsed trip distance in miles reported by the taximeter."
          - name: RATECODEID
            description: "Final rate code in effect at the end of the trip."
          - name: STORE_AND_FWD_FLAG
            description: "Whether the trip record was held in vehicle memory before sending to the vendor (Y/N)."
          - name: PULOCATIONID
            description: "TLC Taxi Zone where the meter was engaged (pickup location)."
            tests:
              - not_null
          - name: DOLOCATIONID
            description: "TLC Taxi Zone where the meter was disengaged (dropoff location)."
            tests:
              - not_null
          - name: PAYMENT_TYPE
            description: "Payment method (1=Credit card, 2=Cash, 3=No charge, 4=Dispute, 5=Unknown, 6=Voided)."
          - name: FARE_AMOUNT
            description: "Meter-calculated fare amount for the trip."
          - name: EXTRA
            description: "Miscellaneous extras and surcharges (rush hour, overnight surcharges)."
          - name: MTA_TAX
            description: "MTA tax automatically triggered based on the metered rate in use."
          - name: TIP_AMOUNT
            description: "Tip amount (automatically populated for credit card payments)."
          - name: TOLLS_AMOUNT
            description: "Total amount of all tolls paid during the trip."
          - name: IMPROVEMENT_SURCHARGE
            description: "Improvement surcharge assessed on hailed trips at the flag drop."
          - name: TOTAL_AMOUNT
            description: "Total amount charged to passengers (excluding cash tips)."
          - name: CONGESTION_SURCHARGE
            description: "Congestion surcharge for trips in/out of Manhattan below 96th Street."
          - name: AIRPORT_FEE
            description: "Fee for pickups and drop-offs at LaGuardia and John F. Kennedy airports."
          - name: CBD_CONGESTION_FEE
            description: "Central Business District congestion fee."
